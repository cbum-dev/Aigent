services:
  - type: web
    name: aigent-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://aigent-1.onrender.com"]' 
      - key: GOOGLE_API_KEY
        sync: false
    plan: starter