services:
  - type: web
    name: aigent-backend
    runtime: docker
    dockerContext: aigent/apps/backend
    dockerfilePath: aigent/apps/backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://aigent-2026.vercel.app"]' 
      - key: GOOGLE_API_KEY
        sync: false
    plan: starter
