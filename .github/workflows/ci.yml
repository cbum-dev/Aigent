name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

jobs:
  quality:
    name: Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python (uv)
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: |
          cd apps/backend
          uv sync --frozen

      - name: Linting
        run: npm run lint

      - name: Type Checking
        run: npm run check-types

      - name: Build
        run: npm run build

      - name: Backend Tests
        run: |
          cd apps/backend
          uv run pytest
